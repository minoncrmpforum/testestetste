<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦИФРОВОЙ КВИЗ // ВЫХОД ТУТ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Базовые настройки стиля */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #0a0a0a; 
            color: #fff; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a14 0%, #0a0a0a 100%);
        }

        :root { 
            --neon-yellow: #ffeb00; 
            --dark-bg: #0d0d0d; 
            /* Фирменное желтое стекло */
            --yellow-glass: rgba(255, 235, 0, 0.03);
            --yellow-glass-border: rgba(255, 235, 0, 0.15);
            --yellow-glass-glow: rgba(255, 235, 0, 0.05);
        }

        header { 
            position: fixed; top: 0; width: 100%; padding: 25px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(10, 10, 10, 0.7); z-index: 1000; 
            backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 235, 0, 0.1); 
        }
        .logo-text { font-weight: 900; color: var(--neon-yellow); font-size: 1.4rem; letter-spacing: 2px; }
        
        .hero { 
            height: 45vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; 
        }
        .game-title { 
            font-size: 5rem; font-weight: 900; text-transform: uppercase; 
            color: var(--neon-yellow); text-shadow: 0 0 20px rgba(255, 235, 0, 0.3); 
        }
        .game-subtitle { font-size: 1.1rem; text-transform: uppercase; color: #888; letter-spacing: 4px; margin-top: 10px; }

        /* ЭФФЕКТ ЖЕЛТОГО ИОС СТЕКЛА */
        .yellow-glass-panel {
            background: var(--yellow-glass);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--yellow-glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), 
                        inset 0 0 20px var(--yellow-glass-glow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .quiz-container {
            max-width: 1400px; margin: 0 auto; padding: 0 40px 100px;
            display: grid; grid-template-columns: 2.5fr 1fr; gap: 40px;
        }

        /* Экран вывода вопроса */
        .question-block {
            grid-column: 1 / -1; padding: 40px; position: relative;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .timer-badge { 
            position: absolute; top: 25px; right: 25px; 
            background: rgba(255, 235, 0, 0.2); border: 1px solid var(--neon-yellow);
            padding: 8px 20px; border-radius: 30px; color: var(--neon-yellow); 
            font-weight: 900; font-size: 1.4rem; box-shadow: 0 0 15px rgba(255, 235, 0, 0.2);
        }
        .question-media-wrapper {
            width: 100%; max-height: 450px; overflow: hidden; 
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px;
        }
        .question-img { width: 100%; height: 100%; object-fit: cover; }
        .question-txt { font-size: 2.2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        /* Трибуны игроков */
        .arena-stands { grid-column: 1 / 2; display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .tribune { 
            padding: 30px 20px; display: flex; flex-direction: column; 
            align-items: center; position: relative; text-align: center;
        }
        
        /* Состояние трибуны, когда игрок успел нажать первый */
        .tribune.leader-active {
            border-color: var(--neon-yellow);
            box-shadow: 0 0 30px rgba(255, 235, 0, 0.25), inset 0 0 20px rgba(255, 235, 0, 0.1);
        }
        /* Блокировка остальных, когда кто-то уже отвечает */
        .tribune.locked-out { opacity: 0.25; transform: scale(0.98); }

        .avatar-box { 
            width: 90px; height: 90px; border-radius: 50%; 
            border: 3px solid rgba(255,255,255,0.2); margin-bottom: 15px; 
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.3);
        }
        .avatar-img { width: 70px; height: 70px; font-size: 2.5rem; text-align: center; line-height: 70px; }
        .player-nickname { font-size: 1.3rem; font-weight: 900; color: #fff; letter-spacing: 1px; margin-bottom: 5px; }
        .player-score-tag { 
            font-size: 1.1rem; font-weight: 700; color: var(--neon-yellow); 
            background: rgba(0,0,0,0.5); padding: 4px 16px; border-radius: 12px; 
            border: 1px solid rgba(255,235,0,0.1);
        }

        /* Кнопка-Биззер на трибуне */
        .buzzer-btn {
            margin-top: 25px; width: 75px; height: 75px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fffa78 0%, #ccbc00 70%, #8a7f00 100%);
            border: 4px solid #fff; cursor: pointer; position: relative;
            box-shadow: 0 6px 16px rgba(0,0,0,0.6), inset 0 2px 3px rgba(255,255,255,0.4);
            transition: transform 0.05s, box-shadow 0.1s;
        }
        .buzzer-btn:active { transform: translateY(3px); box-shadow: 0 2px 6px rgba(0,0,0,0.6); }
        
        /* Эффект свечения кнопки при успешном нажатии */
        .tribune.leader-active .buzzer-btn {
            background: radial-gradient(circle at 35% 35%, #fffb9e 0%, #ffeb00 60%, #b3a500 100%);
            box-shadow: 0 0 25px var(--neon-yellow), 0 4px 10px rgba(0,0,0,0.5);
            border-color: var(--neon-yellow);
        }

        /* Панель управления Ведущего */
        .host-station { padding: 35px 25px; display: flex; flex-direction: column; gap: 20px; height: fit-content; }
        .host-head { font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; border-bottom: 2px solid var(--neon-yellow); padding-bottom: 12px; text-transform: uppercase;}
        
        .action-button {
            background: rgba(255,255,255,0.03); color: #fff; border: 1px solid rgba(255,255,255,0.1);
            padding: 16px; border-radius: 14px; font-weight: 700; text-transform: uppercase;
            cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
        }
        .action-button:hover { background: rgba(255,235,0,0.1); border-color: var(--neon-yellow); color: var(--neon-yellow); }
        
        .judge-zone { display: flex; gap: 12px; margin-top: 10px; }
        .judge-btn { flex: 1; padding: 14px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; opacity: 0.3; pointer-events: none;}
        .judge-btn.active { opacity: 1; pointer-events: auto; }
        
        .btn-yes { background: rgba(0, 255, 100, 0.1); border: 1px solid #00ff64; color: #00ff64; }
        .btn-yes:hover { background: #00ff64; color: #000; box-shadow: 0 0 15px rgba(0, 255, 100, 0.4); }
        .btn-no { background: rgba(255, 30, 60, 0.1); border: 1px solid #ff1e3c; color: #ff1e3c; }
        .btn-no:hover { background: #ff1e3c; color: #fff; box-shadow: 0 0 15px rgba(255, 30, 60, 0.4); }

        .current-responder-info { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }

        footer { text-align: center; padding: 40px; color: #555; font-size: 0.9rem; border-top: 1px solid rgba(255,235,0,0.05); }

        @media (max-width: 1024px) {
            .quiz-container { grid-template-columns: 1fr; }
            .arena-stands { grid-column: 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">ВЫХОД ТУТ // КВИЗ-ИНТЕРФЕЙС</div>
    </header>

    <section class="hero">
        <h1 class="game-title">ГЕЙМ-ВИКТОРИНА</h1>
        <p class="game-subtitle">Интерактивная панель ведущего и игроков</p>
    </section>

    <main class="quiz-container">

        <div class="question-block yellow-glass-panel" id="qBlock">
            <div class="timer-badge" id="timerDisplay">30</div>
            <div class="question-media-wrapper">
                <img id="qImage" src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=cover" class="question-img" alt="Экран Вопроса">
            </div>
            <h2 class="question-txt" id="qText">Ожидание запуска раунда ведущим...</h2>
        </div>

        <div class="arena-stands" id="standsArena">
            <div class="tribune yellow-glass-panel" id="stand-1">
                <div class="avatar-box">
                    <div class="avatar-img">👾</div>
                </div>
                <h3 class="player-nickname">ИГРОК_1</h3>
                <span class="player-score-tag" id="score-1">0 XP</span>
                <button class="buzzer-btn" onclick="pressBuzzer(1)"></button>
            </div>

            <div class="tribune yellow-glass-panel" id="stand-2">
                <div class="avatar-box">
                    <div class="avatar-img">🕹️</div>
                </div>
                <h3 class="player-nickname">ИГРОК_2</h3>
                <span class="player-score-tag" id="score-2">0 XP</span>
                <button class="buzzer-btn" onclick="pressBuzzer(2)"></button>
            </div>

            <div class="tribune yellow-glass-panel" id="stand-3">
                <div class="avatar-box">
                    <div class="avatar-img">🤖</div>
                </div>
                <h3 class="player-nickname">ИГРОК_3</h3>
                <span class="player-score-tag" id="score-3">0 XP</span>
                <button class="buzzer-btn" onclick="pressBuzzer(3)"></button>
            </div>
        </div>

        <div class="host-station yellow-glass-panel">
            <h4 class="host-head">Пульт Управления</h4>
            
            <button class="action-button" onclick="loadNextQuestion()">Следующий вопрос</button>
            
            <div class="current-responder-info">
                <p style="color: #777; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 5px;">Отвечает игрок:</p>
                <div id="responderName" style="font-size: 1.4rem; font-weight: 900; color: var(--neon-yellow);">НИКТО</div>
            </div>

            <div class="judge-zone">
                <button class="judge-btn btn-yes" id="jBtnYes" onclick="judgeResult(true)">Верно (+250)</button>
                <button class="judge-btn btn-no" id="jBtnNo" onclick="judgeResult(false)">Ошибка (-100)</button>
            </div>
        </div>

    </main>

    <footer>
        <p>&copy; ВЫХОД ТУТ // Разработано в точном соответствии с ТЗ</p>
    </footer>

    <script>
        // База данных вопросов (Сюда загружать ссылки на картинки и тексты)
        const questionsDatabase = [
            {
                text: "Из какой культовой игры эта известная стартовая локация?",
                media: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1200&auto=format&fit=cover"
            },
            {
                text: "Угадайте ретро-игру по дизайну интерфейса и цветовой гамме:",
                media: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=1200&auto=format&fit=cover"
            }
        ];

        let pScores = { 1: 0, 2: 0, 3: 0 };
        let currentQuestionIdx = -1;
        let timerVal = 30;
        let timerId = null;
        let activeResponder = null;
        let isRoundActive = false;

        // Переключение на следующий вопрос
        function loadNextQuestion() {
            clearInterval(timerId);
            currentQuestionIdx++;
            
            if(currentQuestionIdx >= questionsDatabase.length) {
                currentQuestionIdx = 0; // Зацикливаем вопросы по кругу
            }

            const currentQ = questionsDatabase[currentQuestionIdx];
            
            // Обновляем медиаэкран
            document.getElementById('qImage').src = currentQ.media;
            document.getElementById('qText').textContent = currentQ.text;
            
            // Сброс блокировок и стилей трибун
            activeResponder = null;
            isRoundActive = true;
            document.getElementById('responderName').textContent = "НИКТО";
            
            for(let i = 1; i <= 3; i++) {
                const stand = document.getElementById(`stand-${i}`);
                stand.classList.remove('leader-active', 'locked-out');
            }

            // Выключение кнопок вердикта у ведущего
            document.getElementById('jBtnYes').classList.remove('active');
            document.getElementById('jBtnNo').classList.remove('active');

            // Счётчик времени раунда
            timerVal = 30;
            document.getElementById('timerDisplay').textContent = timerVal;
            timerId = setInterval(() => {
                timerVal--;
                document.getElementById('timerDisplay').textContent = timerVal;
                if(timerVal <= 0) {
                    clearInterval(timerId);
                    isRoundActive = false;
                    document.getElementById('qText').textContent = "ВРЕМЯ ИСТЕКЛО! ЖДЕМ СЛЕДУЮЩИЙ ВОПРОС.";
                }
            }, 1000);
        }

        // Клик игрока по своей кнопке
        function pressBuzzer(playerNum) {
            if(!isRoundActive || activeResponder !== null) return;

            clearInterval(timerId); // Останавливаем время
            activeResponder = playerNum;

            // Подсвечиваем лидера, блокируем остальных
            document.getElementById(`responderName`).textContent = `ИГРОК_${playerNum}`;
            
            for(let i = 1; i <= 3; i++) {
                const stand = document.getElementById(`stand-${i}`);
                if(i === playerNum) {
                    stand.classList.add('leader-active');
                } else {
                    stand.classList.add('locked-out');
                }
            }

            // Активируем управление на пульте ведущего
            document.getElementById('jBtnYes').classList.add('active');
            document.getElementById('jBtnNo').classList.add('active');
        }

        // Вердикт ведущего
        function judgeResult(isCorrect) {
            if(activeResponder === null) return;

            if(isCorrect) {
                pScores[activeResponder] += 250;
                document.getElementById('qText').textContent = `ПРАВИЛЬНО! ИГРОК_${activeResponder} ПОЛУЧАЕТ +250 XP.`;
            } else {
                pScores[activeResponder] = Math.max(0, pScores[activeResponder] - 100);
                document.getElementById('qText').textContent = `ОШИБКА! ИГРОК_${activeResponder} ТЕРЯЕТ 100 XP.`;
            }

            // Обновляем табло очков на трибунах
            document.getElementById(`score-${activeResponder}`).textContent = `${pScores[activeResponder]} XP`;

            // Закрываем текущую фазу
            isRoundActive = false;
            activeResponder = null;
            document.getElementById('jBtnYes').classList.remove('active');
            document.getElementById('jBtnNo').classList.remove('active');
        }
    </script>
</body>
</html>
