<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>THE BUNKER V.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
  :root {
    --bg-dark: #050508;
    --bg-panel: #0d0d14;
    --bg-card: #141420;
    --orange: #ff5500;
    --orange-glow: rgba(255, 85, 0, 0.4);
    --grey-border: #222230;
    --grey-text: #707085;
    --white: #f5f5fa;
    --neon-green: #00ff66;
    --neon-green-glow: rgba(0, 255, 102, 0.4);
    --neon-red: #ff2233;
    --neon-red-glow: rgba(255, 34, 51, 0.4);
    --neon-blue: #00bfff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background-color: var(--bg-dark);
    background-image: radial-gradient(circle at 50% 20%, rgba(255, 85, 0, 0.08), transparent 70%);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .screen { width: 100%; max-width: 1100px; }
  .hidden { display: none !important; }
  .menu-logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--orange);
    text-shadow: 0 0 20px var(--orange-glow);
    letter-spacing: 6px;
    margin-bottom: 10px;
    text-align: center;
  }
  .menu-version { font-size: 0.85rem; color: var(--grey-text); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 50px; text-align: center; }
  .btn {
    background: linear-gradient(135deg, #151522, #1c1c30); color: var(--white); border: 1px solid var(--grey-border);
    padding: 16px 32px; font-family: 'Space Mono', monospace; font-weight: bold; font-size: 1rem;
    text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border-radius: 8px; transition: all 0.3s ease;
    display: block; margin: 0 auto;
  }
  .btn:hover { border-color: var(--orange); color: #000; background: var(--orange); box-shadow: 0 0 20px var(--orange-glow); }
  .network-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
  .panel { background: var(--bg-panel); border: 1px solid var(--grey-border); border-radius: 12px; padding: 24px; }
  .panel-title { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--orange); margin-bottom: 20px; text-transform: uppercase; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 0.75rem; color: var(--grey-text); margin-bottom: 8px; text-transform: uppercase; }
  input[type="text"] {
    width: 100%; background: #07070b; border: 1px solid var(--grey-border); color: var(--white);
    padding: 14px; border-radius: 6px; font-family: inherit; font-size: 16px;
  }
  .game-layout { display: grid; grid-template-columns: 1fr 320px; gap: 25px; }
  .character-sheet { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .trait-card { background: var(--bg-card); border: 1px solid var(--grey-border); border-radius: 6px; padding: 12px 16px; }
  .trait-card label { color: var(--orange); font-weight: bold; }
  .trait-value { font-size: 0.95rem; }
  .terminal-box { background: #08080f; border: 1px solid var(--grey-border); border-radius: 6px; padding: 12px; height: 120px; overflow-y: auto; }
  .logs-box { background: #050508; border: 1px solid #1a1a26; padding: 10px; height: 140px; overflow-y: auto; font-size: 0.75rem; color: #a5a5b5; margin-top: 10px; }
  .log-line { margin-bottom: 4px; }
  .log-time { color: var(--orange); margin-right: 6px; }
  .player-row { display: flex; justify-content: space-between; padding: 6px; background: var(--bg-card); margin-bottom: 4px; }
</style>
</head>
<body>

  <div id="scr-menu" class="screen">
    <div class="menu-logo">THE BUNKER V.2</div>
    <div class="menu-version">Тактическая игра Выживания.</div>
    <button class="btn" onclick="navigate('scr-menu', 'scr-network')">Создать бункер</button>
  </div>

  <div id="scr-network" class="screen hidden">
    <div class="network-grid">
      <div class="panel">
        <div class="panel-title">Создать Убежище (ХОСТ)</div>
        <div class="form-group">
          <label>Ваш Позывной</label>
          <input type="text" id="inp-host-name" placeholder="Командир...">
        </div>
        <button class="btn" onclick="startTheGame('host')">Занять Бункер</button>
      </div>

      <div class="panel">
        <div class="panel-title">Подключиться к шлюзу (ИГРОК)</div>
        <div class="form-group">
          <label>Ваш Позывной</label>
          <input type="text" id="inp-client-name" placeholder="Выживший...">
        </div>
        <div class="form-group">
          <label>Секретный код Бункера</label>
          <input type="text" id="inp-target-id" placeholder="Вставьте код хоста...">
        </div>
        <button class="btn" onclick="startTheGame('client')">Открыть Шлюз</button>
      </div>
    </div>
  </div>

  <div id="scr-game" class="screen hidden">
    <div class="game-layout">
      <div>
        <div class="panel" style="margin-bottom:20px;">
          <div class="panel-title">Ваша Учетная Запись и Досье: <span id="my-name-badge" style="color:#fff;"></span></div>
          <div class="character-sheet" id="char-sheet-box"></div>
        </div>

        <div class="panel" style="margin-bottom:20px;">
          <div class="panel-title">Список Выживших в сети</div>
          <div class="terminal-box" id="players-terminal-list"></div>
        </div>

        <div class="panel">
          <div class="panel-title" style="font-size:0.8rem; color:var(--grey-text);">Системные логи</div>
          <div class="logs-box" id="terminal-log-flow"></div>
        </div>
      </div>
    </div>
  </div>

<script>
  // Настройки твоего личного Firebase проекта
  const firebaseConfig = {
    apiKey: "AIzaSyD7tXeqTP_HWmfnZV2us10Uocp2iuser6I",
    authDomain: "the-bunker-96d5c.firebaseapp.com",
    databaseURL: "https://the-bunker-96d5c-default-rtdb.firebaseio.com/", // Переключили на базу реального времени
    projectId: "the-bunker-96d5c",
    storageBucket: "the-bunker-96d5c.firebasestorage.app",
    messagingSenderId: "481257011457",
    appId: "1:481257011457:web:b60b5a1f62d17af1520300"
  };

  // Стартуем базу данных
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  let myRole = '', myName = '';
  const professions = ["Врач-хирург", "Инженер ядерных систем", "Агроном био-плантаций", "Слесарь вентиляции", "Программист ИИ"];
  const healths = ["Абсолютно здоров", "Легкое заикание", "Хронический гастрит", "Сломана рука"];

  function navigate(fromId, toId) {
    document.getElementById(fromId).classList.add('hidden');
    document.getElementById(toId).classList.remove('hidden');
  }

  function addTerminalLog(text) {
    const logBox = document.getElementById('terminal-log-flow');
    if(!logBox) return;
    const now = new Date();
    const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    logBox.innerHTML += `<div class="log-line"><span class="log-time">[${timeStr}]</span> ${text}</div>`;
    logBox.scrollTop = logBox.scrollHeight;
  }

  // САМАЯ ГЛАВНАЯ ФУНКЦИЯ: Создает игрока в базе данных Firebase
  function saveUserInDatabase(name, prof, health) {
    // Чистим имя от точек и запрещенных знаков, чтобы Firebase не ругался
    let cleanName = name.replace(/[.#$/\[\]]/g, "_");

    // Отправляем данные прямо в облако
    database.ref('users/' + cleanName).set({
      username: name,
      balance: 5000, // Выдаем 5000 монет на баланс учетки
      profession: prof,
      health: health,
      status: "В бункере"
    })
    .then(() => {
      addTerminalLog(`<span style="color:var(--neon-green)">[БАЗА ДАННЫХ] Учетная запись ${name} успешно создана! Баланс: 5000 CC.</span>`);
    })
    .catch((err) => {
      addTerminalLog(`<span style="color:var(--neon-red)">[ОШИБКА БАЗЫ] Данные не ушли. Причина: ${err.message}</span>`);
    });
  }

  function startTheGame(role) {
    myRole = role;
    if(role === 'host') {
      myName = document.getElementById('inp-host-name').value.trim() || 'Смотритель';
    } else {
      myName = document.getElementById('inp-client-name').value.trim() || 'Выживший';
    }

    document.getElementById('my-name-badge').innerText = myName;

    // Генерируем случайные характеристики персонажа
    let pProf = professions[Math.floor(Math.random() * professions.length)];
    let pHealth = healths[Math.floor(Math.random() * healths.length)];

    // Показываем на экране досье
    document.getElementById('char-sheet-box').innerHTML = `
      <div class="trait-card"><label>Профессия</label><div class="trait-value">${pProf}</div></div>
      <div class="trait-card"><label>Здоровье</label><div class="trait-value">${pHealth}</div></div>
    `;

    document.getElementById('players-terminal-list').innerHTML = `
      <div class="player-row"><span>${myName} (Вы)</span><span style="color:var(--neon-green)">В БУНКЕРЕ</span></div>
    `;

    navigate('scr-network', 'scr-game');
    addTerminalLog("Запуск систем терминала...");

    // ТУТ ИДЕТ АВТОМАТИЧЕСКОЕ СОХРАНЕНИЕ В ОБЛАКО FIREBASE
    saveUserInDatabase(myName, pProf, pHealth);
  }
</script>
</body>
</html>
